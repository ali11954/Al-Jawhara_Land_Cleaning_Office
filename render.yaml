services:
  - type: web
    name: al-jawhara-cleaning
    env: python
    plan: free
    buildCommand: |
      apt-get update
      # تثبيت wkhtmltopdf وكل التبعيات المطلوبة
      apt-get install -y wkhtmltopdf
      apt-get install -y libxrender1 libfontconfig1 libx11-dev libjpeg62 libxtst6
      # تثبيت تبعيات إضافية لضمان عمل wkhtmltopdf بشكل صحيح
      apt-get install -y xfonts-75dpi xfonts-base
      # تحديث pip وتثبيت المتطلبات
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: al-jawhara-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_APP
        value: app.py
      - key: FLASK_DEBUG
        value: 0

databases:
  - name: al-jawhara-db
    databaseName: aljawhara_db
    user: aljawhara_user
    plan: free
    ipAllowList: [] # يسمح بالوصول من جميع الخدمات